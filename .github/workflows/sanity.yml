name: Sanity

on:
  push:
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile bridge/immich_frameo_bridge.py windows/frameo-lan-proxy.py
